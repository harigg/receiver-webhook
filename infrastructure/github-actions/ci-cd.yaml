name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  HARBOR_URL: ${{ vars.HARBOR_URL }}   # e.g. 192.168.49.2:30002
  IMAGE_NAME: ai-company/${{ github.event.repository.name }}

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest ruff mypy

      - name: Lint
        run: ruff check .

      - name: Type check
        run: mypy . --ignore-missing-imports

      - name: Run tests
        run: pytest -v --tb=short

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1

  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: [lint-and-test, security-scan]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.HARBOR_URL }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.HARBOR_URL }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.HARBOR_URL }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    name: Deploy to Kubernetes
    runs-on: self-hosted   # runner must have kubectl + kubeconfig for ai-company cluster
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to agents namespace
        run: |
          kubectl set image deployment/webhook-receiver \
            webhook-receiver=${{ env.HARBOR_URL }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -n agents
          kubectl rollout status deployment/webhook-receiver -n agents --timeout=120s
