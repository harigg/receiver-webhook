    enabled: true
    devRootToken: "root"

  service:
    type: NodePort
    nodePort: 30820

  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m

ui:
  enabled: true
  serviceType: NodePort
  serviceNodePort: 30821

injector:
  enabled: false
