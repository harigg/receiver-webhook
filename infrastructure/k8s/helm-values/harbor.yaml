expose:
  type: nodePort
  nodePort:
    ports:
      http:
        nodePort: 30002
  tls:
    enabled: false

externalURL: http://harbor.local:30002

harborAdminPassword: Harbor12345

persistence:
  enabled: true
  persistentVolumeClaim:
    registry:
      size: 20Gi
    chartmuseum:
      size: 5Gi
    jobservice:
      jobLog:
        size: 2Gi
    database:
      size: 5Gi
    redis:
      size: 2Gi

resources:
  requests:
    memory: 256Mi
    cpu: 100m
