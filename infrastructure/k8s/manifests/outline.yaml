# Outline - Open source wiki/docs (Confluence alternative)
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: outline-config
  namespace: tools
data:
  NODE_ENV: "production"
  DATABASE_URL: "postgres://outline:outline@outline-postgres:5432/outline"
  REDIS_URL: "redis://outline-redis:6379"
  URL: "http://outline.local:30301"
  PORT: "3000"
  # Auth - local email/password
  SECRET_KEY: "outline-secret-key-change-in-prod-must-be-32chars-min"
  UTILS_SECRET: "outline-utils-secret-change-in-prod"
  # File storage - local
  FILE_STORAGE: "local"
  FILE_STORAGE_LOCAL_ROOT_DIR: "/var/lib/outline/data"
  FILE_STORAGE_UPLOAD_MAX_SIZE: "26214400"
  # Email (disabled for local)
  SMTP_HOST: ""
  SMTP_PORT: ""
  SMTP_FROM_EMAIL: "admin@ai-company.local"
  SMTP_REPLY_EMAIL: "admin@ai-company.local"
  # Force create first user as admin
  DEFAULT_LANGUAGE: "en_US"
  PGSSLMODE: "disable"

---
# PostgreSQL for Outline
apiVersion: apps/v1
kind: Deployment
metadata:
  name: outline-postgres
  namespace: tools
spec:
  replicas: 1
  selector:
    matchLabels:
      app: outline-postgres
  template:
    metadata:
      labels:
        app: outline-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          env:
            - name: POSTGRES_USER
              value: outline
            - name: POSTGRES_PASSWORD
              value: outline
            - name: POSTGRES_DB
              value: outline
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: outline-postgres
  namespace: tools
spec:
  selector:
    app: outline-postgres
  ports:
    - port: 5432

---
# Redis for Outline
apiVersion: apps/v1
kind: Deployment
metadata:
  name: outline-redis
  namespace: tools
spec:
  replicas: 1
  selector:
    matchLabels:
      app: outline-redis
  template:
    metadata:
      labels:
        app: outline-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379

---
apiVersion: v1
kind: Service
metadata:
  name: outline-redis
  namespace: tools
spec:
  selector:
    app: outline-redis
  ports:
    - port: 6379

---
# Outline app
apiVersion: apps/v1
kind: Deployment
metadata:
  name: outline
  namespace: tools
spec:
  replicas: 1
  selector:
    matchLabels:
      app: outline
  template:
    metadata:
      labels:
        app: outline
    spec:
      initContainers:
        - name: wait-for-postgres
          image: postgres:15-alpine
          command: ['sh', '-c', 'until pg_isready -h outline-postgres -p 5432; do sleep 2; done']
        - name: db-migrate
          image: outlinewiki/outline:0.79.0
          command: ["yarn", "db:migrate", "--env", "production-ssl-disabled"]
          envFrom:
            - configMapRef:
                name: outline-config
      containers:
        - name: outline
          image: outlinewiki/outline:0.79.0
          envFrom:
            - configMapRef:
                name: outline-config
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: data
              mountPath: /var/lib/outline/data
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
      volumes:
        - name: data
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: outline
  namespace: tools
spec:
  type: NodePort
  selector:
    app: outline
  ports:
    - port: 3000
      nodePort: 30301
