# Webhook receiver + Agent framework deployment
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-config
  namespace: agents
data:
  GITEA_URL: "http://gitea.tools.svc.cluster.local:3000"
  ANTHROPIC_MODEL: "claude-sonnet-4-6"

---
apiVersion: v1
kind: Secret
metadata:
  name: agent-secrets
  namespace: agents
type: Opaque
stringData:
  ANTHROPIC_API_KEY: "REPLACE_WITH_YOUR_KEY"
  GITEA_TOKEN: "REPLACE_WITH_GITEA_TOKEN"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhook-receiver
  namespace: agents
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webhook-receiver
  template:
    metadata:
      labels:
        app: webhook-receiver
    spec:
      containers:
        - name: webhook-receiver
          image: harbor.local:30002/ai-company/webhook-receiver:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: agent-config
            - secretRef:
                name: agent-secrets
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: webhook-receiver
  namespace: agents
spec:
  type: NodePort
  selector:
    app: webhook-receiver
  ports:
    - port: 8080
      nodePort: 30500
