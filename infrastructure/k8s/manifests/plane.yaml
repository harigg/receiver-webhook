# Plane - Open source project management (Jira alternative)
# Uses official makeplane/plane Docker images

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: plane-config
  namespace: tools
data:
  SECRET_KEY: "plane-secret-key-change-in-prod"
  DJANGO_SETTINGS_MODULE: "plane.settings.production"
  DATABASE_URL: "postgresql://plane:plane@plane-postgres:5432/plane"
  REDIS_URL: "redis://plane-redis:6379/"
  WEB_URL: "http://plane.local:30300"
  DEBUG: "0"
  NEXT_PUBLIC_API_BASE_URL: "http://plane.local:30300"

---
apiVersion: v1
kind: Secret
metadata:
  name: plane-secret
  namespace: tools
type: Opaque
stringData:
  postgres-password: plane

---
# PostgreSQL for Plane
apiVersion: apps/v1
kind: Deployment
metadata:
  name: plane-postgres
  namespace: tools
spec:
  replicas: 1
  selector:
    matchLabels:
      app: plane-postgres
  template:
    metadata:
      labels:
        app: plane-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          env:
            - name: POSTGRES_USER
              value: plane
            - name: POSTGRES_PASSWORD
              value: plane
            - name: POSTGRES_DB
              value: plane
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: plane-postgres
  namespace: tools
spec:
  selector:
    app: plane-postgres
  ports:
    - port: 5432

---
# Redis for Plane
apiVersion: apps/v1
kind: Deployment
metadata:
  name: plane-redis
  namespace: tools
spec:
  replicas: 1
  selector:
    matchLabels:
      app: plane-redis
  template:
    metadata:
      labels:
        app: plane-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379

---
apiVersion: v1
kind: Service
metadata:
  name: plane-redis
  namespace: tools
spec:
  selector:
    app: plane-redis
  ports:
    - port: 6379

---
# Plane API backend
apiVersion: apps/v1
kind: Deployment
metadata:
  name: plane-api
  namespace: tools
spec:
  replicas: 1
  selector:
    matchLabels:
      app: plane-api
  template:
    metadata:
      labels:
        app: plane-api
    spec:
      initContainers:
        - name: wait-for-postgres
          image: postgres:15-alpine
          command: ['sh', '-c', 'until pg_isready -h plane-postgres -p 5432; do sleep 2; done']
      containers:
        - name: api
          image: makeplane/plane-backend:stable
          command: ["./bin/docker-entrypoint-api.sh"]
          envFrom:
            - configMapRef:
                name: plane-config
          ports:
            - containerPort: 8000
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m

---
apiVersion: v1
kind: Service
metadata:
  name: plane-api
  namespace: tools
spec:
  selector:
    app: plane-api
  ports:
    - port: 8000

---
# Plane Worker
apiVersion: apps/v1
kind: Deployment
metadata:
  name: plane-worker
  namespace: tools
spec:
  replicas: 1
  selector:
    matchLabels:
      app: plane-worker
  template:
    metadata:
      labels:
        app: plane-worker
    spec:
      containers:
        - name: worker
          image: makeplane/plane-backend:stable
          command: ["./bin/docker-entrypoint-worker.sh"]
          envFrom:
            - configMapRef:
                name: plane-config
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m

---
# Plane Frontend
apiVersion: apps/v1
kind: Deployment
metadata:
  name: plane-frontend
  namespace: tools
spec:
  replicas: 1
  selector:
    matchLabels:
      app: plane-frontend
  template:
    metadata:
      labels:
        app: plane-frontend
    spec:
      containers:
        - name: frontend
          image: makeplane/plane-frontend:stable
          envFrom:
            - configMapRef:
                name: plane-config
          ports:
            - containerPort: 3000
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m

---
apiVersion: v1
kind: Service
metadata:
  name: plane-frontend
  namespace: tools
spec:
  selector:
    app: plane-frontend
  ports:
    - port: 3000

---
# Plane Space (public board view)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: plane-space
  namespace: tools
spec:
  replicas: 1
  selector:
    matchLabels:
      app: plane-space
  template:
    metadata:
      labels:
        app: plane-space
    spec:
      containers:
        - name: space
          image: makeplane/plane-space:stable
          envFrom:
            - configMapRef:
                name: plane-config
          ports:
            - containerPort: 3000
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 250m

---
apiVersion: v1
kind: Service
metadata:
  name: plane-space
  namespace: tools
spec:
  selector:
    app: plane-space
  ports:
    - port: 3000

---
# Nginx proxy - single entry point for Plane
apiVersion: v1
kind: ConfigMap
metadata:
  name: plane-nginx-config
  namespace: tools
data:
  nginx.conf: |
    upstream api-server {
        server plane-api:8000;
    }
    upstream web-server {
        server plane-frontend:3000;
    }
    upstream space-server {
        server plane-space:3000;
    }
    server {
        listen 80;
        client_max_body_size 100M;

        location /api/ {
            proxy_pass http://api-server/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /auth/ {
            proxy_pass http://api-server/auth/;
            proxy_set_header Host $host;
        }
        location /spaces/ {
            proxy_pass http://space-server/spaces/;
            proxy_set_header Host $host;
        }
        location / {
            proxy_pass http://web-server/;
            proxy_set_header Host $host;
        }
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: plane-proxy
  namespace: tools
spec:
  replicas: 1
  selector:
    matchLabels:
      app: plane-proxy
  template:
    metadata:
      labels:
        app: plane-proxy
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx.conf
      volumes:
        - name: nginx-config
          configMap:
            name: plane-nginx-config

---
apiVersion: v1
kind: Service
metadata:
  name: plane-proxy
  namespace: tools
spec:
  type: NodePort
  selector:
    app: plane-proxy
  ports:
    - port: 80
      nodePort: 30300
